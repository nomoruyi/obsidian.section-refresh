name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect version bump flag
        id: detect
        run: node .github/scripts/detect-bump.mjs

      - name: Setup Node
        if: steps.detect.outputs.bump != ''
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.bump != ''
        run: npm ci

      - name: Test (release gate)
        if: steps.detect.outputs.bump != ''
        run: npm test

      - name: Build
        if: steps.detect.outputs.bump != ''
        run: npm run build

      - name: Bump version
        id: bump
        if: steps.detect.outputs.bump != ''
        run: node .github/scripts/bump-version.mjs "${{ steps.detect.outputs.bump }}"

      - name: Commit version bump
        if: steps.detect.outputs.bump != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json package.json versions.json
          git commit -m "chore(release): ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Create GitHub release
        if: steps.detect.outputs.bump != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets="main.js manifest.json"
          [ -f styles.css ] && assets="$assets styles.css"
          gh release create "${{ steps.bump.outputs.version }}" $assets \
            --title "${{ steps.bump.outputs.version }}" \
            --generate-notes \
            --target "$(git rev-parse HEAD)"
